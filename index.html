<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NutriPlan India - Healthy Food for Children</title>
    <meta name="description" content="NutriPlan India helps parents find and prepare healthy, delicious Indian food suitable for their children.">
    
    <!-- PWA Meta Tags & Manifest -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4ade80">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="NutriPlan">
    <link rel="apple-touch-icon" href="./icon-192.png">
    
    <!-- Google Fonts for modern typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons via CDN -->
    <script src="https://unpkg.com/lucide@latest" defer></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Loading Screen -->
    <div id="loading-screen">
        <div class="loader-content">
            <img src="./logo.png" alt="NutriPlan Logo" class="loader-logo">
            <h1 class="loader-title">NutriPlan India</h1>
            <div class="loader-spinner-container">
                <div class="loader-spinner"></div>
            </div>
        </div>
        <div class="org-profile">
            <div class="org-avatar">UI</div>
            <div class="org-info">
                <span class="org-label">Organization</span>
                <span class="org-name">Universal Innovators</span>
            </div>
        </div>
    </div>

    <div id="app"></div>
    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                    .then((reg) => console.log('[Service Worker] Registered successfully with scope:', reg.scope))
                    .catch((err) => console.error('[Service Worker] Registration failed:', err));
            });
        }
    </script>
</body>
</html>
